spring.profiles.active=local
spring.application.name=spring-loom-demo

logging.level.root=info
logging.level.org.springframework.web=info

server.servlet.contextPath=/spring-loom-demo

# Actuator endpoint
management.endpoints.access.default=none
management.endpoint.health.access=read_only

# MongoDB connection settings
spring.data.mongodb.uri=mongodb://localhost:27017/loom_db?replicaSet=rs0

# Maximum number of concurrent persistence operations executed by Virtual Threads
batch.loom.max-concurrency=25